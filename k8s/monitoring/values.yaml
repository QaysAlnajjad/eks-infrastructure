# ------------------------
# Global
# ------------------------
namespaceOverride: monitoring

rbac:
  create: true

# ------------------------
# Prometheus
# ------------------------
prometheus:
  enabled: true

  rbac:
    create: true

  prometheusSpec:
    replicas: 1
    retention: 12h
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    alertingEndpoints:
      - namespace: monitoring
        name: monitoring-kube-prometheus-alertmanager
        port: web

# ------------------------
# Alertmanager
# ------------------------
alertmanager:
  enabled: true
  
  rbac:
    create: true

  alertmanagerSpec:
    replicas: 1
    
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: blackhole
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: blackhole

# ------------------------
# Grafana
# ------------------------
grafana:
  enabled: true

  rbac:
    create: false

  adminPassword: admin
  defaultDashboardsEnabled: true

# ------------------------
# Node exporter
# ------------------------
nodeExporter:
  enabled: true

  rbac:
    create: false

# ------------------------
# kube-state-metrics
# ------------------------
kubeStateMetrics:
  enabled: true

  rbac:
    create: false
