apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: main-routing
  namespace: monitoring
  labels:
    release: monitoring
spec:
  route:
    receiver: default-receiver
    groupBy: ["alertname", "namespace"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h

  receivers:
    - name: default-receiver
      webhookConfigs:
        - url: http://example-webhook.monitoring.svc:8080/alerts
